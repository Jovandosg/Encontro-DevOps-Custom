name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -m pytest tests/ -v --cov=. --cov-report=xml || echo "Tests skipped - no tests directory"

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DOCKER_PUSH == 'true' && vars.DOCKERHUB_USERNAME != '' }}
        run: printf '%s' "${{ secrets.DOCKERHUB_TOKEN }}" | tr -d '\n\r' | docker login -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DOCKER_PUSH == 'true' && vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/encontros-devops:latest
            ${{ vars.DOCKERHUB_USERNAME }}/encontros-devops:v${{ github.run_number }}
          file: ./Dockerfile
          context: .

  CD-homolog:
    if: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') && vars.ENABLE_CD == 'true' && vars.DOCKERHUB_USERNAME != '' }}
    runs-on: ubuntu-latest
    environment: homolog
    needs: [CI]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kubernetes Set Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Create namespace if not exists
        run: kubectl create namespace tech-homolog --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets in homolog
        run: |
          kubectl create secret generic encontros-devops-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --namespace=tech-homolog \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes Cluster
        uses: azure/k8s-deploy@v5
        with:
          namespace: tech-homolog
          manifests: |
            k8s/manifests.yaml
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/encontros-devops:v${{ github.run_number }}
          strategy: basic

  CD-producao:
    if: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') && vars.ENABLE_CD == 'true' && vars.DOCKERHUB_USERNAME != '' }}
    runs-on: ubuntu-latest
    environment: producao
    needs: [CD-homolog]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kubernetes Set Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Create namespace if not exists
        run: kubectl create namespace tech-producao --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets in producao
        run: |
          kubectl create secret generic encontros-devops-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --namespace=tech-producao \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes Cluster
        uses: azure/k8s-deploy@v5
        with:
          namespace: tech-producao
          manifests: |
            k8s/manifests.yaml
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/encontros-devops:v${{ github.run_number }}
          strategy: basic
