version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: encontros-devops-db
    environment:
      POSTGRES_USER: encontros_tech
      POSTGRES_PASSWORD: encontros_tech
      POSTGRES_DB: encontros_tech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encontros_tech"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: encontros-devops-web
    environment:
      DATABASE_URL: postgresql://encontros_tech:encontros_tech@db:5432/encontros_tech
      FLASK_ENV: development
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
